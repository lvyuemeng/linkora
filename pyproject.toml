[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "scholaraio"
version = "0.1.0"
description = "Scholar All-In-One — local academic literature explorer powered by AI"
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "Zimo Liao", email = "zimoliao@mail.ustc.edu.cn" },
    { name = "nostalgia", email = "lv15623448685@gmail.com" },
]
keywords = [
    "academic",
    "literature",
    "research",
    "knowledge-base",
    "semantic-search",
    "mcp",
    "claude",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Text Processing :: Indexing",
]
dependencies = ["requests>=2.28", "pyyaml>=6.0"]

[project.urls]
Homepage = "https://github.com/zimoliao/scholaraio"
Repository = "https://github.com/zimoliao/scholaraio"
Issues = "https://github.com/zimoliao/scholaraio/issues"

[project.optional-dependencies]
embed = ["sentence-transformers>=3.0", "numpy>=1.24", "faiss-cpu>=1.7"]
topics = ["scholaraio[embed]", "bertopic>=0.16", "pandas>=2.0"]
import = ["endnote-utils>=1.0", "pyzotero>=1.5"]
mcp = ["mcp>=1.0"]
full = [
    "scholaraio[embed]",
    "scholaraio[topics]",
    "scholaraio[import]",
    "modelscope>=1.10",
    "curl-cffi>=0.5",
]

[project.scripts]
scholaraio = "scholaraio.cli:main"
scholaraio-mcp = "scholaraio.mcp_server:main"

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff>=0.15.5",
]

[tool.setuptools.packages.find]
where = ["."]
