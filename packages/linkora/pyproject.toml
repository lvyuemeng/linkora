[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "linkora"
dynamic = ["version"]
description = "Local Knowledge Network CLI"
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "nostalgia", email = "lv15623448685@gmail.com" },
]
dependencies = [
    "linkora-core==0.4.0",
]

[project.scripts]
linkora = "linkora.cli:run"

[tool.setuptools]
package-dir = { "" = "../.." }

[tool.setuptools.packages.find]
where = ["../.."]
include = ["linkora.cli", "linkora.cli.*"]

[tool.setuptools.dynamic]
version = { attr = "linkora.__version__" }
