[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "linkora-core"
dynamic = ["version"]
description = "Core runtime and domain modules for linkora"
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "nostalgia", email = "lv15623448685@gmail.com" },
]
dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
    "pydantic>=2.12",
    "tenacity>=9.1",
    "litellm>=1.50",
    "kreuzberg[pdf]>=4.7.2",
]

[project.optional-dependencies]
extract = [
    "kreuzberg[pdf]>=4.0",
]
extract-ocr = [
    "kreuzberg[all]>=4.0",
]
embed = [
    "lancedb>=0.15",
    "sentence-transformers>=3.0",
    "modelscope>=1.10",
]
topics = [
    "bertopic>=0.16",
    "pandas>=2.0",
]

[tool.setuptools]
package-dir = { "" = "../.." }

[tool.setuptools.packages.find]
where = ["../.."]
include = ["linkora", "linkora.*"]
exclude = ["linkora.cli", "linkora.cli.*"]

[tool.setuptools.dynamic]
version = { attr = "linkora.__version__" }
