# PyPI Publishing Workflow
# Builds and publishes package to PyPI on tag push

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: pypi
            index: ""
            token: PYPI_TOKEN
          - name: testpypi
            index: "--index testpypi"
            token: TEST_PYPI_TOKEN

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      # Build the package
      - run: uv sync --extra full
      - run: uv build

      # Optional: debug list
      - run: ls -la dist/

      # Check token exists
      - name: Ensure token exists
        run: |
          if [ -z "${UV_PUBLISH_TOKEN}" ]; then
            echo "Missing token for ${{ matrix.name }}"
            exit 1
          fi
        env:
          UV_PUBLISH_TOKEN: ${{ secrets[matrix.token] }}

      # Publish directly from build folder
      - name: Publish to ${{ matrix.name }}
        if: matrix.name == 'pypi' || contains(github.ref_name, 'rc')
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets[matrix.token] }}