name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra full

      - id: version
        name: Parse version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Release preflight
        run: uv run python scripts/release_sync.py preflight --tag "${GITHUB_REF_NAME}"

  publish_core:
    name: Publish linkora-core
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra full

      - name: Build linkora-core
        run: uv build --project packages/linkora-core

      - name: Publish linkora-core
        run: uv publish
        working-directory: packages/linkora-core
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  verify_core_available:
    name: Verify core availability
    needs: [preflight, publish_core]
    runs-on: ubuntu-latest

    steps:
      - uses: astral-sh/setup-uv@v7

      - uses: actions/checkout@v6

      - name: Wait for linkora-core availability
        run: uv run python scripts/release_sync.py wait-core --version "${RELEASE_VERSION}" --attempts 6 --delay 20
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}

  publish_cli:
    name: Publish linkora
    needs: [preflight, verify_core_available]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra full

      - name: Build linkora
        run: uv build --project packages/linkora

      - name: Publish linkora
        run: uv publish
        working-directory: packages/linkora
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  post_publish_smoke:
    name: Post-publish smoke
    needs: publish_cli
    runs-on: ubuntu-latest

    steps:
      - uses: astral-sh/setup-uv@v7

      - name: CLI smoke check
        run: uvx --from linkora linkora --help
