# CI Pipeline
# Runs linting, type checking, and tests on multiple platforms

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Ruff (format)
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python }})
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13"]
        exclude:
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - run: uv sync

      - name: Run tests
        # use module import
        run: uv run -m pytest -v