# CI Pipeline
# Runs linting, type checking, and tests on multiple platforms

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint_type:
    name: Lint/Type (py3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra full

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Ruff (format)
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

  verify_release_sync:
    name: Verify Release Sync
    needs: lint_type
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra full

      - name: Verify version sync
        run: uv run python scripts/release_sync.py verify

      - name: Verify core/cli import boundary
        run: uv run python scripts/release_sync.py check-boundary

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python }})
    needs: lint_type
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13"]
        exclude:
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - run: uv sync --extra full

      - name: Run tests
        # use module import
        run: uv run -m pytest -v

  build_packages:
    name: Build Packages
    needs: verify_release_sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --extra full

      - name: Build linkora-core
        run: uv build --project packages/linkora-core

      - name: Build linkora
        run: uv build --project packages/linkora
