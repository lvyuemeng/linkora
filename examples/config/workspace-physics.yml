# =============================================================================
# linkora Workspace-Local Configuration
# =============================================================================
# This is a workspace-local config file for physics workspace
# Location: <root>/workspace/physics/linkora.yml
#
# IMPORTANT: Workspace-local config can ONLY override the `sources` field.
# Other fields will be ignored with a warning.
# =============================================================================

# Override sources for physics workspace
sources:
  local:
    enabled: true
    papers_dir: papers
    paths:
      - /backup/physics
      - /mnt/external/physics-papers

  openalex:
    enabled: true
    # api_key: ""  # Set via OPENALEX_API_KEY env var
