# Physics Research Workspace Configuration
# Example workspace-local config for physics research

name: physics
description: "Physics research workspace - condensed matter physics"

# Custom root for this workspace (optional)
root: /data/physics

# Data sources for this workspace
sources:
  local:
    enabled: true
    papers_dir: papers
    paths:
      - /backup/physics
      - /mnt/external/physics-papers

  openalex:
    enabled: true
    api_key: ""  # Set via OPENALEX_API_KEY env var

# Index configuration
index:
  top_k: 20
  embed_model: Qwen/Qwen3-Embedding-0.6B
  chunk_size: 1000  # Larger chunks for physics papers
  chunk_overlap: 200

# LLM configuration
llm:
  backend: openai-compat
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key: ""  # Set via DEEPSEEK_API_KEY env var

# Ingest configuration
ingest:
  extractor: robust
  abstract_llm_mode: verify
