# Default Workspace Configuration
# Example workspace-local config with basic settings

name: default
description: "Default research workspace"

# Use default root (auto-detected or from linkora_ROOT env)

sources:
  local:
    enabled: true
    papers_dir: papers
    paths: []  # No additional paths

# Index configuration - defaults
index:
  top_k: 20
  embed_model: Qwen/Qwen3-Embedding-0.6B
  embed_device: auto
  chunk_size: 800
  chunk_overlap: 150

# LLM configuration
llm:
  backend: openai-compat
  model: deepseek-chat
  base_url: https://api.deepseek.com

# Logging
logging:
  level: INFO
