# =============================================================================
# linkora Global Configuration
# =============================================================================
# This is the global config file (~/.linkora/config.yml)
# Workspaces are defined here, with optional workspace-local overrides
# =============================================================================

# Default workspace to use when linkora_WORKSPACE is not set
default_workspace: default

# =============================================================================
# Workspace Definitions
# =============================================================================
# Each workspace has its own papers, index, and settings
# Workspace name as key, with description and optional root override

workspace:
  default:
    description: "Default research workspace"

  research:
    description: "Main research workspace"
    # root: /custom/path  # Optional: override default root location

  physics:
    description: "Physics research workspace"
    root: /data/physics

# =============================================================================
# Data Sources
# =============================================================================
# Configure where to find papers

sources:
  # Local PDF files
  local:
    enabled: true
    papers_dir: papers  # Primary papers directory (workspace-relative)
    # Additional paths to scan for papers (absolute or home-relative)
    paths:
      - /mnt/library/papers
      - ~/Documents/research

  # OpenAlex API for paper metadata
  openalex:
    enabled: false
    # api_key: ""  # Set via OPENALEX_API_KEY env var

  # Zotero library sync
  zotero:
    enabled: false
    # library_id: ""   # Set via ZOTERO_LIBRARY_ID env var
    # api_key: ""     # Set via ZOTERO_API_KEY env var
    library_type: user

  # EndNote XML/RIS import
  endnote:
    enabled: true

# =============================================================================
# Index and Search Settings
# =============================================================================

index:
  # Default number of results
  top_k: 20

  # Embedding model for semantic search
  embed_model: Qwen/Qwen3-Embedding-0.6B
  embed_device: auto  # auto, cpu, cuda
  embed_cache: ~/.cache/modelscope/hub/models
  embed_source: modelscope

  # Vector search settings
  embed_top_k: 10

  # Text chunking for embeddings
  chunk_size: 800
  chunk_overlap: 150

# =============================================================================
# LLM Configuration
# =============================================================================
# For metadata extraction and enrichment

llm:
  # Backend: openai-compat, openai, anthropic
  backend: openai-compat

  # Model name
  model: deepseek-chat

  # API endpoint (for openai-compat)
  base_url: https://api.deepseek.com

  # API key - use environment variable
  # api_key: ${DEEPSEEK_API_KEY}

  # Request timeout (seconds)
  timeout: 30
  timeout_toc: 120
  timeout_clean: 90

# =============================================================================
# PDF Ingest Settings
# =============================================================================

ingest:
  # Extractor: regex, llm, auto, robust
  extractor: robust

  # MinerU configuration (local or cloud)
  mineru_endpoint: http://localhost:8000
  mineru_cloud_url: https://mineru.net/api/v4
  # mineru_api_key: ""  # Set via MINERU_API_KEY env var

  # Abstract extraction mode: verify, extract, skip
  abstract_llm_mode: verify

  # Contact email for API services
  # contact_email: ""

# =============================================================================
# Topic Modeling (Optional)
# =============================================================================

topics:
  # Minimum documents per topic
  min_topic_size: 5

  # Number of topics (0 = auto)
  nr_topics: 0

  # Model storage directory
  model_dir: topic_model

# =============================================================================
# Logging Configuration
# =============================================================================

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: INFO

  # Log file (relative to workspace)
  file: linkora.log

  # Log rotation
  max_bytes: 10_000_000
  backup_count: 3

  # Metrics database
  metrics_db: metrics.db
